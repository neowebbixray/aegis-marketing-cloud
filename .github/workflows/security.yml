# =============================================================================
# Aegis Marketing Cloud — Weekly Security Scan
# =============================================================================
# Runs automatically every Monday at 09:00 UTC.
# Scans performed:
#   1. Dependency vulnerability scanning (pip audit, npm audit)
#   2. SAST via CodeQL (JavaScript/TypeScript + Python)
#   3. Secret scanning (truffleHog / Gitleaks-style)
# =============================================================================

name: Security Scan

on:
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Dependency Scanning ────────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # ── Python dependencies ──────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Scan Python dependencies (pip-audit)
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit \
            --requirement <(pip freeze 2>/dev/null || true) \
            --ignore-vuln PYSEC-XXXX-XXXX \
            || echo "::warning::pip-audit found vulnerabilities"

      - name: Scan Python dependencies (Safety)
        uses: pyupio/safety-action@v1
        with:
          api-key: ${{ secrets.SAFETY_API_KEY }}
        continue-on-error: true

      # ── Node.js dependencies ─────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Scan npm dependencies
        run: |
          npm audit --audit-level=high || echo "::warning::npm audit found vulnerabilities"

      - name: Upload dependency scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-scan-results
          path: |
            pip-audit-report.*
            npm-audit-report.*

  # ── SAST — CodeQL ─────────────────────────────────────────────────────
  codeql-analysis:
    name: SAST — CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript", "python"]

    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality
          config-file: .github/codeql-config.yml

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          upload: true
          output: sarif-results

  # ── Secret Scanning ───────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for git-based scanning

      - name: Scan with Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Scan with truffleHog
        uses: trufflesecurity/trufflehog@v3
        continue-on-error: true
        with:
          extra_args: --only-verified --fail

      - name: Check for placeholder secrets in .env.example
        run: |
          echo "Checking .env.example for placeholder values..."
          PLACEHOLDER_COUNT=$(grep -c 'change-me\|your-\|YOUR_\|xxxxx\|placeholder' .env.example || true)
          if [ "$PLACEHOLDER_COUNT" -gt 0 ]; then
            echo "::warning::Found $PLACEHOLDER_COUNT placeholder values in .env.example"
          fi
          echo "✅ Placeholder check complete"

      - name: Upload secret scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-scan-results
          path: |
            gitleaks-report.*
            trufflehog-report.*

  # ── Summary ───────────────────────────────────────────────────────────
  security-summary:
    name: Security Summary
    needs: [dependency-scan, codeql-analysis, secret-scan]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check all security scan statuses
        run: |
          echo "## Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY

          for job in "dependency-scan" "codeql-analysis (javascript-typescript)" "codeql-analysis (python)" "secret-scan"; do
            echo "| $job | ✅ Completed |" >> $GITHUB_STEP_SUMMARY
          done

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_Review artifacts for detailed findings._" >> $GITHUB_STEP_SUMMARY
