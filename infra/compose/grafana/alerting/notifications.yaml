# Grafana notification channel for PagerDuty (provisioning)
# Place this file under /etc/grafana/provisioning/notifications
# Adjust the URL and HTTP headers with your actual PagerDuty integration key.
apiVersion: 1
providers:
  - name: "PagerDuty"
    type: webhook
    orgId: 1
    isDefault: false
    sendReminder: false
    url: "https://events.pagerduty.com/v2/enqueue"
    httpMethod: POST
    httpHeader:
      Content-Type: "application/json"
