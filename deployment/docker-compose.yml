# =============================================================================
# Aegis Marketing Cloud — Development Docker Compose
#
# Infrastructure services: PostgreSQL 16, Redis 7, MinIO, RabbitMQ, Qdrant
# Application services: Backend (FastAPI), Frontend (Next.js 14)
# =============================================================================

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-healthcheck: &default-healthcheck
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 30s

services:
  # --- Database ---
  postgres:
    image: postgres:16-alpine
    container_name: amc-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: amc
      POSTGRES_PASSWORD: amc_secret
      POSTGRES_DB: aegis_marketing_cloud
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amc -d aegis_marketing_cloud"]
      interval: 5s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # --- Cache ---
  redis:
    image: redis:7-alpine
    container_name: amc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
    logging: *default-logging

  # --- Object Storage ---
  minio:
    image: minio/minio:latest
    container_name: amc-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
    logging: *default-logging

  # --- Message Broker ---
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: amc-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: amc
      RABBITMQ_DEFAULT_PASS: amc_secret
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 5
    logging: *default-logging

  # --- Vector Database ---
  qdrant:
    image: qdrant/qdrant:latest
    container_name: amc-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: "6334"
      QDRANT__SERVICE__GRPC_ENABLED: "true"
    healthcheck:
      test: ["CMD", "sh", "-c", "timeout 1 bash -c ': > /dev/tcp/localhost/6333'"]
      interval: 15s
    logging: *default-logging

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: ../src/backend
      dockerfile: Dockerfile
      target: development
    container_name: amc-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../src/backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://amc:amc_secret@postgres:5432/aegis_marketing_cloud
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - RABBITMQ_URL=amqp://amc:amc_secret@rabbitmq:5672/
      - QDRANT_URL=http://qdrant:6333
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_USE_SSL=false
      - ENVIRONMENT=development
      - DEBUG=true
    volumes:
      - ../src/backend:/app
      - /app/.venv
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
    logging: *default-logging

  # --- Frontend (Next.js) ---
  frontend:
    build:
      context: ../src/frontend
      dockerfile: Dockerfile
      target: development
    container_name: amc-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ../src/frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    logging: *default-logging

  # --- Mailhog (Dev Email) ---
  mailhog:
    image: mailhog/mailhog:latest
    container_name: amc-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    logging: *default-logging

volumes:
  pg-data:
  redis-data:
  minio-data:
  rabbitmq-data:
  qdrant-data:

networks:
  default:
    name: amc-dev
    driver: bridge
