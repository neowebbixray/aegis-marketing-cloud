name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - ".github/workflows/docker-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"
      - "src/frontend/**"
      - "Dockerfile"
      - "docker-compose.yml"

jobs:
  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: src/backend
          file: src/backend/Dockerfile
          tags: amc-backend:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          tags: amc-frontend:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start services via compose
        run: |
          docker compose -f docker-compose.yml up -d postgres redis minio qdrant rabbitmq
          sleep 15
          docker compose -f docker-compose.yml up -d backend
          # Wait for backend health
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && echo "Backend healthy" && break
            sleep 2
          done

      - name: Smoke test
        run: |
          curl -f http://localhost:8000/health
          curl -f http://localhost:8000/api/v1/auth/health
