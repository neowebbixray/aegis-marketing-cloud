        Returns the docs-mandated ``{data, meta, links}`` envelope.'
      operationId: list_conversations_api_v1_ai_conversations_get
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          minimum: 1
          default: 1
          title: Page
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: user_id
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: uuid
          - type: 'null'
          title: User Id
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
          title: Authorization
