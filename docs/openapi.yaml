      - ai
      summary: List Agents
      description: 'List all available AI agent definitions (built-in catalog).


        Returns the docs-mandated ``{data: {...}}`` envelope.'
      operationId: list_agents_api_v1_ai_agents_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response List Agents Api V1 Ai Agents Get
      x-amc-auth: optional
      x-amc-rate-limit:
        enabled: true
        limit: 100
        window_seconds: 60
      x-amc-version: '1'
      x-amc-changelog: https://docs.aegismc.com/api/changelog/v1
  /api/v1/ai/agents/{agent_type}:
