name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: amc
          POSTGRES_PASSWORD: amc_secret
          POSTGRES_DB: aegis_marketing_cloud_test
        ports: [5432:5432]
        options: >-
          --health-cmd="pg_isready -U amc -d aegis_marketing_cloud_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports: [6379:6379]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Lint with Ruff
        run: |
          ruff check .

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://amc:amc_secret@localhost:5432/aegis_marketing_cloud_test
          REDIS_URL: redis://:aegis_redis@localhost:6379/0
          SECRET_KEY: test-secret-key-for-ci
          JWT_ALGORITHM: RS256
          DEBUG: true
        run: |
          pytest tests/ -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./src/frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Build for production
        run: npm run build

