# Prometheus Configuration
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: "amc-backend"
    scrape_interval: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:8000"]

  - job_name: "amc-n8n"
    scrape_interval: 15s
    metrics_path: /metrics
    static_configs:
      - targets: ["n8n:5678"]

  - job_name: "amc-postgres"
    scrape_interval: 15s
    static_configs:
      - targets: ["postgres:9187"]

  - job_name: "amc-redis"
    scrape_interval: 15s
    static_configs:
      - targets: ["redis:9121"]

  - job_name: "amc-rabbitmq"
    scrape_interval: 15s
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
