# ───────────────────────────────────────────────────────────────────────────────
# Aegis Marketing Cloud — Security Pipeline
# ───────────────────────────────────────────────────────────────────────────────
# Runs on pushes to master and on pull requests touching security-sensitive
# files.  Executes:
#   1. Python SAST (Bandit)
#   2. pip-audit (Python dependency vulnerabilities)
#   3. npm audit  (Node.js dependency vulnerabilities)
#   4. Trivy filesystem scan (codebase)
#   5. (Optional) ESLint security plugin
# ───────────────────────────────────────────────────────────────────────────────
name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - ".github/workflows/security.yml"
      - "deployment/security/**"
  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "deployment/security/**"
  schedule:
    # Weekly scan every Monday at 09:00 UTC
    - cron: "0 9 * * 1"
  workflow_dispatch: # Allow manual trigger

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Job 1: Python SAST & Dependency Audit ─────────────────────────────────
  python-security:
    name: Python Security (Bandit + pip-audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          # Security audit tools
          pip install bandit pip-audit

      - name: Bandit SAST
        run: |
          bandit -r app/ -c deployment/security/bandit.conf -f custom \
            -o reports/security/bandit_report.txt || true
          cat reports/security/bandit_report.txt | head -30

      - name: pip-audit (Python deps)
        run: |
          pip-audit --desc on 2>&1 || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: src/backend/reports/security/bandit_report.txt
          retention-days: 30

  # ── Job 2: Node.js Dependency Audit ───────────────────────────────────────
  npm-security:
    name: npm Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: |
          npm audit --audit-level=high 2>&1 || true

  # ── Job 3: Trivy Filesystem Scan ──────────────────────────────────────────
  trivy-scan:
    name: Trivy Filesystem Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy (repo scan)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 0 # WARN-only for now; set to 1 to fail on findings
          format: table
          output: reports/trivy-fs.txt

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-fs-report
          path: reports/trivy-fs.txt
          retention-days: 30

  # ── Job 4: Combined Dependency Audit Script ────────────────────────────────
  dependency-audit:
    name: Unified Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install Python deps + pip-audit
        run: |
          cd src/backend
          python -m pip install --upgrade pip
          pip install -e .
          pip install pip-audit

      - name: Install Node deps
        run: |
          cd src/frontend
          npm ci

      - name: Run dependency audit script
        run: |
          bash scripts/ci-dependency-audit.sh
