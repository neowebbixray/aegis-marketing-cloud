name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "src/backend/**"
      - ".github/workflows/backend-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "src/backend/**"

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run ruff
        run: uv run ruff check app/ tests/

      - name: Run mypy
        run: uv run mypy app/

  test:
    name: Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: amc
          POSTGRES_PASSWORD: amc_secret
          POSTGRES_DB: aegis_marketing_cloud
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        env:
          DATABASE_URL: postgresql+asyncpg://amc:amc_secret@localhost:5432/aegis_marketing_cloud
        run: |
          uv venv
          uv pip install -e ".[dev]"

      - name: Run pytest
        env:
          DATABASE_URL: postgresql+asyncpg://amc:amc_secret@localhost:5432/aegis_marketing_cloud
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
        run: uv run pytest tests/ -v --cov=app --cov-report=term-missing
