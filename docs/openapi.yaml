      parameters:
      - name: agent_type
        in: path
        required: true
        schema:
          type: string
          title: Agent Type
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Agent Api V1 Ai Agents  Agent Type  Get
